---
# LOAD SECRETS & VARS
- name: Load encrypted database credentials
  include_vars: "~/3tier-project/ansible/roles/database/vars/vault.yml"

- name: Load database dynamic variables
  include_vars: "~/3tier-project/ansible/roles/database/vars/main.yml"

- name: Load backend dynamic variables (Generated by Terraform)
  include_vars: "~/3tier-project/ansible/roles/backend/vars/main.yml"
- name: Load dynamic variables
  include_vars: "~/3tier-project/ansible/roles/database/vars/main.yml"

# INSTALL PYTHON
- name: Install Python and pip
  apt:
    name: 
      - python3
      - python3-pip
      - python3-venv
    state: present
    update_cache: yes

# PREPARE DIRECTORY & COPY APP
- name: Create application directory
  file:
    path: /home/ubuntu/app/backend
    state: directory
    owner: ubuntu
    mode: '0755'

- name: Copy backend code to server
  copy:
    src: "~/3tier-project/app_light/backend/" 
    dest: "/home/ubuntu/app/backend/"
    owner: ubuntu
    mode: '0755'

# INSTALL REQUIREMENTS
- name: Install Python dependencies
  pip:
    requirements: "/home/ubuntu/app/backend/requirements.txt"
    virtualenv: "/home/ubuntu/app/backend/venv"   #create venv
    virtualenv_command: "/usr/bin/python3 -m venv"

# SYSTEMD SERVICE
- name: Deploy Systemd service file
  template:
    src: backend.service.j2
    dest: /etc/systemd/system/backend.service   #we named our app_service backend this will used to start and restart
  notify: Restart Backend

- name: Ensure Backend is running and enabled
  service:
    name: backend
    state: started
    enabled: yes